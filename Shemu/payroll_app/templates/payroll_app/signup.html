{% extends 'payroll_app/base.html' %}

{% block content %}
<div class="form-card" style="margin-top: 5rem;">
    <h2 style="text-align:center;">Create Account</h2>
    <p class="text-muted text-center mb-4" style="font-size:0.88rem;">Sign up for Shemu Payroll</p>

    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" name="username" class="form-control" placeholder="Choose a username" autofocus required>
        </div>
        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" name="password1" class="form-control" placeholder="Enter password" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Confirm Password</label>
            <input type="password" name="password2" class="form-control" placeholder="Confirm password" required>
        </div>
        <button type="submit" class="btn btn-accent w-100 mb-3">Create Account</button>
        <p class="text-center text-muted" style="font-size:0.85rem;">
            Already have an account? <a href="{% url 'login' %}" style="color:var(--accent);">Sign in</a>
        </p>
    </form>
</div>
{% endblock %}
