{% extends 'payroll_app/base.html' %}

{% block content %}
<div class="page-header">
    <h1 class="page-title">Audit Log</h1>
</div>

<div class="card">
    <table class="table table-hover mb-0">
        <thead>
            <tr>
                <th>Timestamp</th>
                <th>User</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            {% for log in logs %}
            <tr>
                <td class="text-muted" style="font-size:0.85rem; white-space:nowrap;">{{ log.timestamp|date:"M d, Y h:i A" }}</td>
                <td><strong>{{ log.user.username }}</strong></td>
                <td>{{ log.action }}</td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="3" class="text-center text-muted py-4">No activity yet.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
