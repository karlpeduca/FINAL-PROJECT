{% extends 'payroll_app/base.html' %}

{% block content %}
<div class="form-card" style="margin-top: 5rem;">
    <h2 style="text-align:center;">Welcome to Shemu</h2>
    <p class="text-muted text-center mb-4" style="font-size:0.88rem;">Sign in to your account</p>

    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" name="username" class="form-control" placeholder="Enter username" autofocus required>
        </div>
        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" placeholder="Enter password" required>
        </div>
        <button type="submit" class="btn btn-accent w-100 mb-3">Sign In</button>
        <p class="text-center text-muted" style="font-size:0.85rem;">
            Don't have an account? <a href="{% url 'signup' %}" style="color:var(--accent);">Sign up</a>
        </p>
    </form>
</div>
{% endblock %}
